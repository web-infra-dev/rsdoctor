packages:
  - e2e/**
  - scripts/**
  - packages/**
  - examples/**
  - '!**/compiled/**'

allowBuilds:
  '@swc/core': false
  core-js: false
  core-js-pure: false
  esbuild: true
  nx: false

catalog:
  '@rsbuild/core': 2.0.5
  '@rsbuild/plugin-check-syntax': 1.6.1
  '@rsbuild/plugin-less': 1.6.3
  '@rsbuild/plugin-node-polyfill': ^1.4.4
  '@rsbuild/plugin-react': 2.0.0
  '@rsbuild/plugin-sass': ^1.5.2
  '@rsbuild/plugin-svgr': 2.0.2
  '@rsbuild/plugin-type-check': ^1.3.4
  '@rslint/core': ^0.5.2
  '@rspack/cli': 2.0.2
  '@rspack/core': 2.0.2
  '@rspack/plugin-react-refresh': 2.0.0
  '@rspack/resolver': 0.2.8
  '@rstest/core': 0.9.10
  '@types/body-parser': 1.19.6
  '@types/connect': 3.4.38
  '@types/estree': 1.0.5
  '@types/fs-extra': ^11.0.4
  '@types/node': ^24.12.3
  '@types/path-browserify': 1.0.3
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3
  '@types/tapable': 2.3.0
  antd: 5.19.1
  clsx: ^2.1.1
  cross-env: ^10.1.0
  dayjs: 1.11.20
  es-toolkit: ^1.45.1
  filesize: ^10.1.6
  fs-extra: ^11.1.1
  path-browserify: 1.0.1
  picocolors: ^1.1.1
  prebundle: 1.6.4
  react: 19.2.6
  react-dom: 19.2.6
  react-markdown: ^9.1.0
  react-router-dom: 6.30.3
  sirv: 3.0.2
  socket.io-client: 4.8.1
  source-map: ^0.7.6
  tslib: 2.8.1
  typescript: ^6.0.3

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - '@rspack/*'
  - '@rsbuild/*'
  - '@rslib/*'
  - '@rspress/*'
  - '@rstest/*'
  - '@rsdoctor/*'
  - '@rslint/*'

overrides:
  '@remix-run/router': 1.23.2
  call-bind-apply-helpers: 1.0.2
  es-object-atoms: 1.1.1
  get-intrinsic: 1.3.0
  minimatch: ^9.0.9
  node-forge: 1.4.0
  qs: 6.15.1
  rc-dialog: 9.1.0
  rc-tree: 5.7.2
  sirv: 3.0.2
  socket.io-parser: 4.2.6
  tar: 7.5.15
  tslib: 2.8.1

strictDepBuilds: true
