packages:
  - e2e/**
  - scripts/**
  - packages/**
  - examples/**
  - '!**/compiled/**'

allowBuilds:
  '@swc/core': false
  core-js: false
  core-js-pure: false
  esbuild: true
  nx: false

catalog:
  '@rsbuild/core': ^2.0.9
  '@rsbuild/plugin-check-syntax': ^1.6.1
  '@rsbuild/plugin-less': ^1.6.4
  '@rsbuild/plugin-node-polyfill': ^1.4.5
  '@rsbuild/plugin-react': ^2.0.1
  '@rsbuild/plugin-sass': ^1.5.3
  '@rsbuild/plugin-svgr': ^2.0.3
  '@rsbuild/plugin-type-check': ^1.3.5
  '@rslint/core': ^0.5.3
  '@rspack/cli': ^2.0.5
  '@rspack/core': ^2.0.5
  '@rspack/plugin-react-refresh': ^2.0.1
  '@rspack/resolver': ^0.2.8
  '@rstest/core': 0.10.3
  '@types/body-parser': 1.19.6
  '@types/connect': 3.4.38
  '@types/estree': 1.0.5
  '@types/fs-extra': ^11.0.4
  '@types/node': ^24.12.3
  '@types/path-browserify': 1.0.3
  '@types/react': ^19.2.15
  '@types/react-dom': ^19.2.3
  '@types/tapable': 2.3.0
  antd: 5.19.1
  clsx: ^2.1.1
  cross-env: ^10.1.0
  dayjs: 1.11.21
  es-toolkit: ^1.47.0
  filesize: ^11.0.17
  fs-extra: ^11.1.1
  path-browserify: 1.0.1
  picocolors: ^1.1.1
  prebundle: 1.6.5
  react: 19.2.6
  react-dom: 19.2.6
  react-error-boundary: ^4.1.2
  react-markdown: ^9.1.0
  react-router-dom: 6.30.3
  sirv: 3.0.2
  socket.io-client: 4.8.1
  source-map: ^0.7.6
  tslib: 2.8.1
  typescript: ^6.0.3

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - '@rspack/*'
  - '@rsbuild/*'
  - '@rslib/*'
  - '@rspress/*'
  - '@rstest/*'
  - '@rsdoctor/*'
  - '@rslint/*'
  # Renovate security update: ws@8.21.0
  - ws@8.21.0

overrides:
  '@remix-run/router': 1.23.3
  call-bind-apply-helpers: 1.0.2
  es-object-atoms: 1.1.2
  get-intrinsic: 1.3.0
  minimatch: ^9.0.9
  node-forge: 1.4.0
  qs: 6.15.2
  rc-dialog: 9.1.0
  rc-tree: 5.7.2
  sirv: 3.0.2
  socket.io-parser: 4.2.6
  tar: 7.5.15
  tslib: 2.8.1
  ws: 8.21.0

strictDepBuilds: true
